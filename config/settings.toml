[instrument]
strings = 5
tuning_midi = [23, 28, 33, 38, 43] # B0, E1, A1, D2, G2
max_fret = 24

[router_weights]
w_fret = 1.0     # Penalización por desplazamiento horizontal
w_string = 0.5   # Penalización por cruce a cuerdas agudas innecesario
w_open = -0.2    # Recompensa por anclaje en cuerda al aire

[dsp]
sample_rate = 22050
frame_length = 2048
hop_length = 256
fmin = 41.2      # Fundamental de E1
fmax = 392.0     # Fundamental de G4
voiced_confidence_threshold = 0.05
rms_silence_threshold = 0.05
ghost_spectral_flatness_threshold = 0.5
beat_voiced_ratio_threshold = 0.5
slide_pitch_change_threshold_hz = 1.0
slide_tolerance_hz = 1.0
slide_min_duration_frames = 3
